════════════════════════════════════════════════════════════════ */
let db = null;

function initFirebase() {
  try {
    const cfg = window.FIREBASE_CONFIG;
    if (!cfg || cfg.apiKey === "COLE_SUA_apiKey_AQUI") {
      console.warn("Firebase não configurado — usando localStorage como fallback.");
      return false;
    }
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.database();
    return true;
  } catch(e) {
    console.error("Erro ao inicializar Firebase:", e);
    return false;
  }
}

const fbConnected = initFirebase();

// Mostra indicador visual de sincronização
function showSync(msg) {
  const el = document.getElementById("fb-status");
  if (!el) return;
  el.textContent = "⟳ " + msg;
  el.style.display = "flex";
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.display = "none"; }, 2000);
}

const store = {
  async get(key) {
    if (fbConnected && db) {
      try {
        const snap = await db.ref("controla_gt/" + key).get();
        return snap.exists() ? snap.val() : null;
      } catch(e) { console.error("FB get error:", e); }
    }
    // Fallback: localStorage
    try {
      const v = localStorage.getItem("gt_" + key);
      return v ? JSON.parse(v) : null;
    } catch(e) { return null; }
  },
  async set(key, val) {
    if (fbConnected && db) {
      try {
        showSync("Salvando...");
        await db.ref("controla_gt/" + key).set(val);
        return;
      } catch(e) { console.error("FB set error:", e); }
    }
    try { localStorage.setItem("gt_" + key, JSON.stringify(val)); } catch(e) {}
  },
  // Escuta mudanças em tempo real — chama callback quando o dado mudar
  subscribe(key, callback) {
    if (fbConnected && db) {
      const ref = db.ref("controla_gt/" + key);
      ref.on("value", snap => { callback(snap.exists() ? snap.val() : null); });
      return () => ref.off("value");
    }
    return () => {}; // sem live-sync no fallback
  }
};

function parseNum(s){ if(typeof s==="number")return s; s=String(s||"").trim(); if(!s)return NaN; if(s.includes(",")) s=s.replace(/\./g,"").replace(",","."); return parseFloat(s); }
function cap(s){ if(!s)return ""; return s.split(" ").map(w=>w.charAt(0)+w.slice(1).toLowerCase()).join(" "); }

function resolveStatus(e){
  if(!e.date) return e.status;

  return e.status;
}
async function sha256(str){
  try{
    const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }catch(e){ let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h)+str.charCodeAt(i); return String(h>>>0); }
}

function scopedLines(user,isAdmin,users){
  if(isAdmin) return SEED_LINES;
  const rec=users?users.find(u=>u.id===user):null;
  const acct=rec?rec.account:user;
  return SEED_LINES.filter(l=>l.user===acct);
}
function revOf(mk,revenue){ return HIST_KEYS.includes(mk)?REV_REAL[mk]:(revenue[mk]||0); }
function effPct(line,mk,pctOv){ const o=pctOv&&pctOv[line.id]; if(o&&typeof o[mk]==="number") return o[mk]; return line.minPct; }
function orcadoOf(line,mk,revenue,pctOv){ return revOf(mk,revenue)*effPct(line,mk,pctOv); }
function realBreakdown(line,mk,entries){
  if(HIST_KEYS.includes(mk)){ const v=line.hist[mk]||0; return {pago:v,aPagar:0,total:v}; }
  let pago=0,aPagar=0;
  for(const e of entries){
    if(e.lineId!==line.id||e.month!==mk) continue;
    if(resolveStatus(e)==="pago") pago+=e.value; else aPagar+=e.value;
  }
  return {pago,aPagar,total:pago+aPagar};
}
function realOf(line,mk,entries){ return realBreakdown(line,mk,entries).total; }
function projOf(line,mk,entries,revenue,pctOv){ const r=realOf(line,mk,entries); if(HIST_KEYS.includes(mk)||r>0) return r; return orcadoOf(line,mk,revenue,pctOv); }

  const [session,setSession]=useState(null);
  const [entries,setEntries]=useState([]);
  const [revenue,setRevenue]=useState(REV_FC_SEED);
  const [pctOv,setPctOv]=useState({});
  const [tab,setTab]=useState("dash");

  // Carrega dados + inicia listeners em tempo real
  useEffect(()=>{(async()=>{
    const [e,r,p,a,u]=await Promise.all([
      store.get(KEY_ENT),store.get(KEY_REV),store.get(KEY_PCT),
      store.get(KEY_AUTH),store.get(KEY_USERS)
    ]);
    if(Array.isArray(e)) setEntries(e);
    if(r&&typeof r==="object") setRevenue({...REV_FC_SEED,...r});
    if(p&&typeof p==="object") setPctOv(p);
    if(a&&typeof a==="object") setAuthMap(a);
    if(Array.isArray(u)&&u.length) setUsers(u);
    setBooted(true);

    // Listeners em tempo real (Firebase)
    store.subscribe(KEY_ENT, v=>{ if(Array.isArray(v)) setEntries(v); });
    store.subscribe(KEY_REV, v=>{ if(v&&typeof v==="object") setRevenue({...REV_FC_SEED,...v}); });
    store.subscribe(KEY_PCT, v=>{ if(v&&typeof v==="object") setPctOv(v); });
    store.subscribe(KEY_AUTH,v=>{ if(v&&typeof v==="object") setAuthMap(v); });
    store.subscribe(KEY_USERS,v=>{ if(Array.isArray(v)&&v.length) setUsers(v); });
  })();},[]);

  const saveEntries=async n=>{setEntries(n);await store.set(KEY_ENT,n);};
  const saveRevenue=async n=>{setRevenue(n);await store.set(KEY_REV,n);};
  const savePct    =async n=>{setPctOv(n);  await store.set(KEY_PCT,n);};
  const saveAuth   =async n=>{setAuthMap(n);await store.set(KEY_AUTH,n);};
  const saveUsers  =async n=>{setUsers(n);  await store.set(KEY_USERS,n);};

  if(!booted) return <Splash/>;
  if(session?.firstLogin) return <ChangePin user={session.user} authMap={authMap} saveAuth={saveAuth} onDone={()=>setSession(s=>({...s,firstLogin:false}))} isFirst/>;
  if(!session) return <Login users={users} authMap={authMap} saveAuth={saveAuth} onLogin={setSession}/>;

  const sessionRec  =users.find(u=>u.id===session.user)||{role:"conta"};
  const isAdmin     =sessionRec.role==="admin";
  const canPremissas=sessionRec.role==="admin"||sessionRec.role==="premissas";

  return (
    <div style={{minHeight:"100vh",background:C.paper,color:C.ink}}>
      <TopBar user={session.user} isAdmin={isAdmin} canPremissas={canPremissas} tab={tab} setTab={setTab} onLogout={()=>setSession(null)}/>
      <main style={{maxWidth:1180,margin:"0 auto",padding:"22px 18px 50px"}}>
        {tab==="dash"    &&<Dashboard user={session.user} isAdmin={isAdmin} users={users} entries={entries} revenue={revenue} pctOv={pctOv}/>}
        {tab==="desp"    &&<PorDespesa user={session.user} isAdmin={isAdmin} users={users} entries={entries} revenue={revenue} pctOv={pctOv}/>}
        {tab==="lanc"    &&<Lancamentos user={session.user} isAdmin={isAdmin} users={users} entries={entries} saveEntries={saveEntries}/>}
        {tab==="import"  &&<Importar user={session.user} isAdmin={isAdmin} users={users} entries={entries} saveEntries={saveEntries}/>}
        {tab==="config"  &&canPremissas&&<Premissas revenue={revenue} saveRevenue={saveRevenue} pctOv={pctOv} savePct={savePct} entries={entries} saveEntries={saveEntries}/>}
        {tab==="usuarios"&&isAdmin&&<GerenciarUsuarios users={users} saveUsers={saveUsers} authMap={authMap} saveAuth={saveAuth} currentUser={session.user}/>}
        {tab==="pin"     &&<ChangePin user={session.user} authMap={authMap} saveAuth={saveAuth} onDone={()=>setTab("dash")}/>}
      </main>
      <footer style={{textAlign:"center",fontSize:11.5,color:C.faint,padding:"0 18px 28px"}}>
        Grupo GT · Diretoria de ADM e Finanças · {fbConnected?"🟢 Dados sincronizados em tempo real via Firebase":"🟡 Modo offline (localStorage)"}
      </footer>
    </div>
  );
}

function Splash(){return <div style={{minHeight:"100vh",display:"grid",placeItems:"center",background:C.paper,color:C.mute}}>Carregando painel…</div>;}

/* ════  LOGIN  ════ */
function Login({users,authMap,saveAuth,onLogin}){
  const [sel,setSel]=useState("");
  const [pin,setPin]=useState("");
  const [show,setShow]=useState(false);
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);

  const handleLogin=async()=>{
    if(!sel){setErr("Selecione seu usuário.");return;}
    if(pin.length!==6){setErr("A senha possui 6 dígitos.");return;}
    setLoading(true);setErr("");
    const hash=await sha256(pin);
    const rec=authMap[sel];
    if(!rec){
      const defHash=await sha256(DEFAULT_PIN);
      if(hash!==defHash){setLoading(false);setErr("Senha incorreta.");return;}
      const newMap={...authMap,[sel]:{hash:defHash,firstLogin:true}};
      await saveAuth(newMap);setLoading(false);
      onLogin({user:sel,firstLogin:true});
    }else{
      if(hash!==rec.hash){setLoading(false);setErr("Senha incorreta.");return;}
      setLoading(false);onLogin({user:sel,firstLogin:!!rec.firstLogin});
    }
  };

  return (
    <div style={{minHeight:"100vh",background:C.ink,display:"grid",placeItems:"center",padding:18}}>
      <div style={{width:"100%",maxWidth:400,background:C.panel,borderRadius:16,padding:"36px 32px",boxShadow:"0 24px 60px rgba(0,0,0,.4)"}}>
        <GTLogo size={30}/>
        <h1 style={{fontSize:22,fontWeight:800,margin:"16px 0 4px",letterSpacing:-.3}}>Controla GT</h1>
        <p style={{color:C.mute,fontSize:13,margin:"0 0 26px",lineHeight:1.55}}>Acesso protegido por senha. Primeiro acesso: use <b>123456</b>.</p>
        <label style={labelSt}>Usuário</label>
        <div style={{position:"relative",marginTop:6,marginBottom:16}}>
          <select value={sel} onChange={e=>{setSel(e.target.value);setErr("");}} style={{width:"100%",appearance:"none",padding:"13px 38px 13px 13px",borderRadius:10,border:`1.5px solid ${C.line}`,fontSize:14.5,background:"#fff",color:sel?C.ink:C.faint,cursor:"pointer"}}>
            <option value="">Selecione…</option>
            <optgroup label="Administradores">{(users||[]).filter(u=>u.role==="admin").map(u=><option key={u.id} value={u.id}>{cap(u.name)}</option>)}</optgroup>
            <optgroup label="Premissas">{(users||[]).filter(u=>u.role==="premissas").map(u=><option key={u.id} value={u.id}>{cap(u.name)}</option>)}</optgroup>
            <optgroup label="Contas">{(users||[]).filter(u=>u.role==="conta").map(u=><option key={u.id} value={u.id}>{cap(u.name)}</option>)}</optgroup>
          </select>
          <ChevronDown size={17} color={C.mute} style={{position:"absolute",right:13,top:14,pointerEvents:"none"}}/>
        </div>
        <label style={labelSt}>Senha (6 dígitos)</label>
        <div style={{position:"relative",marginTop:6,marginBottom:6}}>
          <input type={show?"text":"password"} value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,"").slice(0,6));setErr("");}} onKeyDown={e=>{if(e.key==="Enter")handleLogin();}} placeholder="••••••" inputMode="numeric" maxLength={6} style={{width:"100%",padding:"13px 46px 13px 13px",borderRadius:10,border:`1.5px solid ${err?C.red:C.line}`,fontSize:22,letterSpacing:8,background:"#fff",color:C.ink,boxSizing:"border-box",fontFamily:"monospace"}}/>
          <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:12,border:"none",background:"transparent",cursor:"pointer",color:C.mute,padding:4}}>{show?<EyeOffIcon size={18}/>:<EyeIcon size={18}/>}</button>
        </div>
        <div style={{display:"flex",gap:6,marginBottom:16,justifyContent:"center"}}>
          {[0,1,2,3,4,5].map(i=><div key={i} style={{width:32,height:4,borderRadius:2,background:pin.length>i?C.green:C.line,transition:"background .15s"}}/>)}
        </div>
        {err&&<div style={{marginBottom:14,padding:"9px 12px",borderRadius:8,background:C.redSoft,color:C.red,fontSize:12.5,display:"flex",gap:7,alignItems:"center"}}><AlertTriangle size={15}/>{err}</div>}
        <button onClick={handleLogin} disabled={loading||pin.length!==6||!sel} style={{width:"100%",padding:"13px",borderRadius:10,border:"none",background:(pin.length===6&&sel)?C.navy:"#C9CDC9",color:"#fff",fontWeight:700,fontSize:15,cursor:(pin.length===6&&sel)?"pointer":"not-allowed",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <LockIcon size={16}/>{loading?"Verificando…":"Entrar"}
        </button>
      </div>
    </div>
  );
}

/* ════  TROCA DE SENHA  ════ */
function PinInput({value,onChange,show,setShow,placeholder,onEnter,matchOk,matchFail}){
  const bc=matchFail?C.red:matchOk?C.paid:C.line;
  return <div style={{position:"relative",marginTop:6}}>
    <input type={show?"text":"password"} value={value} onChange={e=>onChange(e.target.value.replace(/\D/g,"").slice(0,6))} onKeyDown={e=>{if(e.key==="Enter"&&onEnter)onEnter();}} inputMode="numeric" maxLength={6} placeholder={placeholder}
      style={{width:"100%",padding:"13px 46px 13px 13px",borderRadius:10,border:`1.5px solid ${bc}`,fontSize:22,letterSpacing:8,background:"#fff",color:C.ink,boxSizing:"border-box",fontFamily:"monospace"}}/>
    <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:13,border:"none",background:"transparent",cursor:"pointer",color:C.mute,padding:4}}>{show?<EyeOffIcon size={17}/>:<EyeIcon size={17}/>}</button>
    {matchOk&&<CheckCircle2 size={16} color={C.paid} style={{position:"absolute",right:40,top:15}}/>}
  </div>;
}
function PinDots({value}){
  return <div style={{display:"flex",gap:6,marginTop:8,justifyContent:"center"}}>
    {[0,1,2,3,4,5].map(i=><div key={i} style={{width:32,height:4,borderRadius:2,background:value.length>i?C.navy:C.line,transition:"background .15s"}}/>)}
  </div>;
}
function ChangePin({user,authMap,saveAuth,onDone,isFirst=false}){
  const [cur,setCur]=useState(""); const [next,setNext]=useState(""); const [conf,setConf]=useState("");
  const [showC,setShowC]=useState(false); const [showN,setShowN]=useState(false);
  const [err,setErr]=useState(""); const [ok,setOk]=useState(false); const [loading,setLoading]=useState(false);

  const handleSave=async()=>{
    setErr("");
    if(!isFirst&&cur.length!==6){setErr("Informe sua senha atual.");return;}
    if(next.length!==6){setErr("A nova senha deve ter 6 dígitos.");return;}
    if(next!==conf){setErr("A confirmação não coincide.");return;}
    setLoading(true);
    if(!isFirst){ const ch=await sha256(cur); if(ch!==authMap[user]?.hash){setLoading(false);setErr("Senha atual incorreta.");return;} }
    const nh=await sha256(next);
    const conflict=Object.entries(authMap).find(([u,v])=>u!==user&&v.hash===nh);
    if(conflict){setLoading(false);setErr("Essa senha já está em uso por outro usuário.");return;}
    await saveAuth({...authMap,[user]:{hash:nh,firstLogin:false}});
    setLoading(false);setOk(true);setTimeout(()=>onDone(),1400);
  };

  if(ok) return <div style={{minHeight:"100vh",background:C.paper,display:"grid",placeItems:"center"}}><div style={{textAlign:"center",padding:32}}><div style={{width:64,height:64,borderRadius:"50%",background:C.paidSoft,display:"grid",placeItems:"center",margin:"0 auto 18px"}}><CheckCircle2 size={32} color={C.paid}/></div><h2 style={{fontWeight:800,fontSize:20,margin:"0 0 8px"}}>Senha atualizada!</h2><p style={{color:C.mute,fontSize:14}}>{isFirst?"Bem-vindo ao Controla GT!":"Redirecionando…"}</p></div></div>;

  return (
    <div style={{minHeight:"100vh",background:isFirst?C.ink:C.paper,display:"grid",placeItems:"center",padding:18}}>
      <div style={{width:"100%",maxWidth:400,background:C.panel,borderRadius:16,padding:"36px 32px",boxShadow:"0 24px 60px rgba(0,0,0,.35)"}}>
        <GTLogo size={28}/>
        <h1 style={{fontSize:20,fontWeight:800,margin:"16px 0 4px"}}>{isFirst?"Crie sua senha pessoal":"Alterar senha"}</h1>
        <p style={{color:C.mute,fontSize:13,margin:"0 0 24px",lineHeight:1.55}}>{isFirst?`Olá, ${cap(user)}! Defina uma senha de 6 dígitos.`:`Altere sua senha, ${cap(user)}.`}</p>
        {!isFirst&&<><label style={labelSt}>Senha atual</label><PinInput value={cur} onChange={setCur} show={showC} setShow={setShowC} placeholder="Senha atual"/><div style={{height:14}}/></>}
        <label style={labelSt}>Nova senha</label>
        <PinInput value={next} onChange={setNext} show={showN} setShow={setShowN} placeholder="Nova senha"/>
        <PinDots value={next}/>
        <label style={{...labelSt,marginTop:14}}>Confirmar nova senha</label>
        <PinInput value={conf} onChange={setConf} show={showN} setShow={setShowN} placeholder="Repita" onEnter={handleSave} matchOk={conf.length===6&&conf===next} matchFail={conf.length===6&&conf!==next}/>
        {err&&<div style={{margin:"14px 0",padding:"9px 12px",borderRadius:8,background:C.redSoft,color:C.red,fontSize:12.5,display:"flex",gap:7,alignItems:"center"}}><AlertTriangle size={14}/>{err}</div>}
        <button onClick={handleSave} disabled={loading} style={{width:"100%",marginTop:18,padding:"13px",borderRadius:10,border:"none",background:C.navy,color:"#fff",fontWeight:700,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <KeyIcon size={16}/>{loading?"Salvando…":"Salvar senha"}
        </button>
      </div>
    </div>
  );
}

/* ════  DASHBOARD  ════ */
function Dashboard({user,isAdmin,users,entries,revenue,pctOv}){
  const [mk,setMk]=useState(CURRENT_MONTH);
  const [view,setView]=useState("mes");
  const [acct,setAcct]=useState("__all__");
  const allAccounts=useMemo(()=>[...new Set((users||[]).map(u=>u.account))],[users]);
  const lines=useMemo(()=>{ let l=scopedLines(user,isAdmin,users); if(isAdmin&&acct!=="__all__") l=l.filter(x=>x.user===acct); return l; },[user,isAdmin,users,acct]);

  const series=MONTHS.map(m=>{ let orc=0,pago=0,aPagar=0; for(const l of lines){orc+=orcadoOf(l,m.k,revenue,pctOv);const bd=realBreakdown(l,m.k,entries);pago+=bd.pago;aPagar+=bd.aPagar;} return {mes:m.label,mk:m.k,orcado:orc,pago,aPagar,real:pago+aPagar,hist:m.hist}; });
  const cur=series.find(s=>s.mk===mk);
  const rev=revOf(mk,revenue),variacaoTotal=cur.real-cur.orcado;
  const metaPct=lines.reduce((a,l)=>a+effPct(l,mk,pctOv),0);
  const orcAno=series.reduce((a,s)=>a+s.orcado,0);
  const realYTD=series.reduce((a,s)=>a+s.real,0);
  const projAno=lines.reduce((a,l)=>a+MONTHS.reduce((b,m)=>b+projOf(l,m.k,entries,revenue,pctOv),0),0);
  const rows=lines.map(l=>{const o=orcadoOf(l,mk,revenue,pctOv);const bd=realBreakdown(l,mk,entries);return {...l,orc:o,...bd,vari:bd.total-o};}).sort((a,b)=>b.orc-a.orc);
  const byAcct=isAdmin?allAccounts.map(ac=>{const ls=SEED_LINES.filter(l=>l.user===ac);let o=0,pago=0,aPagar=0;for(const l of ls){o+=orcadoOf(l,mk,revenue,pctOv);const bd=realBreakdown(l,mk,entries);pago+=bd.pago;aPagar+=bd.aPagar;}return{ac,orc:o,pago,aPagar,total:pago+aPagar,vari:pago+aPagar-o};}).filter(x=>x.orc>0||x.total>0).sort((a,b)=>b.orc-a.orc):[];

  return <div>
    <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",marginBottom:18}}>
      <div>
        <h2 style={{fontSize:19,fontWeight:800,margin:0,letterSpacing:-.3}}>{isAdmin?"Consolidado geral":`Conta ${cap(user)}`}</h2>
        <p style={{margin:"3px 0 0",fontSize:12.5,color:C.mute}}>{view==="mes"?`${MONTHS.find(m=>m.k===mk).full} · ${cur.hist?"Realizado":"Lançamentos e projeção"}`:"Visão anual"}</p>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <Toggle value={view} onChange={setView} opts={[["mes","Mês"],["ano","Ano"]]}/>
        {isAdmin&&<SelectInline value={acct} onChange={setAcct} icon={FilterIcon}><option value="__all__">Todas as contas</option>{allAccounts.map(a=><option key={a} value={a}>{cap(a)}</option>)}</SelectInline>}
      </div>
    </div>
    {view==="mes"&&<div style={{display:"flex",gap:5,overflowX:"auto",paddingBottom:6,marginBottom:16}}>{MONTHS.map(m=><button key={m.k} onClick={()=>setMk(m.k)} style={{flex:"0 0 auto",padding:"7px 13px",borderRadius:8,border:`1px solid ${mk===m.k?C.green:C.line}`,background:mk===m.k?C.green:"#fff",color:mk===m.k?"#fff":(m.k===CURRENT_MONTH?C.green:C.mute),fontWeight:m.k===CURRENT_MONTH?800:600,fontSize:12.5,cursor:"pointer"}}>{m.label}{m.k===CURRENT_MONTH&&<span style={{marginLeft:4,fontSize:9}}>•</span>}</button>)}</div>}
    {view==="mes"?(<>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:18}}>
        <Kpi icon={Wallet} label="Orçado" value={<Money v={cur.orcado}/>} tone="ink" sub={`Meta · ${pct(metaPct)} do receb.`}/>
        <Kpi icon={CheckCircle2} label="Realizado Pago" value={<Money v={cur.pago}/>} tone="paid" sub={rev?`${pct(cur.pago/rev)} s/ recebimento`:"—"}/>
        <Kpi icon={ClockIcon} label="Realizado À Pagar" value={<Money v={cur.aPagar}/>} tone="amber" sub={rev?`${pct(cur.aPagar/rev)} s/ recebimento`:"—"}/>
        <Kpi icon={Receipt} label="Realizado Total" value={<Money v={cur.real}/>} tone={variacaoTotal>0?"red":"green"} sub={cur.orcado?`Variação: ${(variacaoTotal>0?"+":"")+(variacaoTotal/cur.orcado*100).toLocaleString("pt-BR",{maximumFractionDigits:1})}%`:"—"}/>
      </div>
      {cur.real>0&&<ProgressBar pago={cur.pago} aPagar={cur.aPagar} orcado={cur.orcado}/>}
    </>):(<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:18}}>
      <Kpi icon={Wallet} label="Orçado anual" value={<Money v={orcAno}/>} tone="ink" sub="Soma 12 meses"/>

/* ════  LANÇAMENTOS  ════ */
function Lancamentos({user,isAdmin,users,entries,saveEntries}){
  const lines=scopedLines(user,isAdmin,users);
  const initForm={lineId:lines[0]?.id||"",month:CURRENT_MONTH,value:"",date:"",status:"",desc:""};
  const [form,setForm]=useState(initForm);
  const [fMonth,setFMonth]=useState("todos");
  const [fStatus,setFStatus]=useState("todos");
  const [err,setErr]=useState("");

  const handleDateChange=dv=>{ const ns=dv?(isPastOrToday(dv)?"pago":"a_pagar"):""; setForm(f=>({...f,date:dv,status:ns})); };
  const add=async()=>{
    if(!form.lineId){setErr("Selecione a linha.");return;}
    const v=parseNum(form.value); if(!v||v<=0){setErr("Valor inválido.");return;}
    if(!form.date){setErr("Informe a data.");return;}
    if(!form.desc.trim()){setErr("Informe uma descrição.");return;}
    setErr("");
    await saveEntries([...entries,{id:Date.now()+Math.random(),lineId:Number(form.lineId),month:form.month,value:v,status:form.status,date:form.date,desc:form.desc.trim(),by:user,ts:new Date().toISOString()}]);
    setForm(initForm);
  };
  const del=async id=>await saveEntries(entries.filter(e=>e.id!==id));
  const toggleStatus=async id=>await saveEntries(entries.map(e=>e.id!==id?e:{...e,status:resolveStatus(e)==="a_pagar"?"pago":"a_pagar"}));

  const visibleIds=new Set(lines.map(l=>l.id));
  let list=entries.filter(e=>visibleIds.has(e.lineId));
  if(fMonth!=="todos") list=list.filter(e=>e.month===fMonth);
  if(fStatus!=="todos") list=list.filter(e=>resolveStatus(e)===fStatus);
  list=list.sort((a,b)=>(b.ts||"").localeCompare(a.ts||""));
  const totalPago=list.filter(e=>resolveStatus(e)==="pago").reduce((a,e)=>a+e.value,0);
  const totalAPagar=list.filter(e=>resolveStatus(e)==="a_pagar").reduce((a,e)=>a+e.value,0);
  const lineName=id=>SEED_LINES.find(l=>l.id===id)?.cat||"—";
  const lineUser=id=>SEED_LINES.find(l=>l.id===id)?.user||"";

  return <div>
    <h2 style={{fontSize:19,fontWeight:800,margin:"0 0 3px",letterSpacing:-.3}}>Lançamentos</h2>
    <p style={{margin:"0 0 18px",fontSize:12.5,color:C.mute}}>Registre despesas de {monthRange()}. Data passada/hoje → <b style={{color:C.paid}}>Pago</b> · Data futura → <b style={{color:C.amber}}>À Pagar</b>.</p>
    <Panel title="Novo lançamento" hint={isAdmin?"Você pode lançar em qualquer conta":`Conta ${cap(user)}`}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12}}>
        <Field label="Linha de despesa *" span2><Select value={form.lineId} onChange={v=>setForm(f=>({...f,lineId:v}))}>{lines.map(l=><option key={l.id} value={l.id}>{isAdmin?`${cap(l.user)} · `:""}{l.cat}</option>)}</Select></Field>
        <Field label="Mês *"><Select value={form.month} onChange={v=>setForm(f=>({...f,month:v}))}>{OPEN_KEYS.map(k=><option key={k} value={k}>{MONTHS.find(m=>m.k===k).full}</option>)}</Select></Field>
        <Field label="Valor (R$) *"><input value={form.value} onChange={e=>setForm(f=>({...f,value:e.target.value}))} placeholder="0,00" inputMode="decimal" style={inpStyle}/></Field>
        <Field label="Data de vencimento / pagamento *"><input type="date" value={form.date} onChange={e=>handleDateChange(e.target.value)} style={inpStyle}/></Field>
        <Field label="Situação">
          {form.date?<div style={{...inpStyle,display:"flex",alignItems:"center",gap:8,background:form.status==="pago"?C.paidSoft:C.oweSoft,color:form.status==="pago"?C.paid:C.amber,fontWeight:700,border:`1px solid ${form.status==="pago"?C.paid:C.amber}`,cursor:"default"}}>{form.status==="pago"?<CheckCircle2 size={15}/>:<ClockIcon size={15}/>}{form.status==="pago"?"Pago":"À Pagar"}<span style={{marginLeft:"auto",fontSize:10,opacity:.65}}>automático</span></div>
          :<div style={{...inpStyle,display:"flex",alignItems:"center",gap:8,background:C.paper,color:C.faint}}><ClockIcon size={15}/> Informe a data</div>}
        </Field>
        <Field label="Descrição *" span2><input value={form.desc} onChange={e=>setForm(f=>({...f,desc:e.target.value}))} placeholder="Ex.: NF 1234, fornecedor X…" style={inpStyle}/></Field>
      </div>
      {err&&<div style={{marginTop:12,padding:"9px 12px",borderRadius:8,background:C.redSoft,color:C.red,fontSize:12.5,display:"flex",gap:7,alignItems:"center"}}><AlertTriangle size={15}/>{err}</div>}
      <button onClick={add} style={{marginTop:14,padding:"11px 20px",borderRadius:9,border:"none",background:C.green,color:"#fff",fontWeight:700,fontSize:13.5,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}}><PlusCircle size={16}/> Adicionar lançamento</button>
    </Panel>
    {list.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:14}}>
      <MiniKpi label="Pago (filtro)" value={<Money v={totalPago}/>} color={C.paid} bg={C.paidSoft}/>
      <MiniKpi label="À Pagar (filtro)" value={<Money v={totalAPagar}/>} color={C.amber} bg={C.oweSoft}/>
      <MiniKpi label="Total (filtro)" value={<Money v={totalPago+totalAPagar}/>} color={C.ink} bg={C.paper}/>
    </div>}
    <Panel title={`Lançamentos (${list.length})`} hint={<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <SelectInline value={fMonth} onChange={setFMonth}><option value="todos">Todos os meses</option>{OPEN_KEYS.map(k=><option key={k} value={k}>{MONTHS.find(m=>m.k===k).full}</option>)}</SelectInline>
      <SelectInline value={fStatus} onChange={setFStatus}><option value="todos">Todos os status</option><option value="pago">Pago</option><option value="a_pagar">À Pagar</option></SelectInline>
    </div>}>
      {list.length===0?<div style={{padding:"30px 0",textAlign:"center",color:C.faint,fontSize:13}}>Nenhum lançamento encontrado.</div>
      :<Tbl head={[isAdmin?"Conta":null,"Linha","Mês","Valor","Vencimento","Situação","Descrição",""].filter(Boolean)}>
        {list.map(e=>{ const st=resolveStatus(e); const auto=e.status==="a_pagar"&&st==="pago"; return <tr key={e.id}>{isAdmin&&<td style={{...tdStyle,color:C.mute,fontSize:11.5}}>{cap(lineUser(e.lineId))}</td>}<td style={{...tdStyle,fontWeight:600}}>{lineName(e.lineId)}</td><td style={tdStyle}>{MONTHS.find(m=>m.k===e.month)?.label}</td><td style={{...tdNum,fontWeight:700}}><Money v={e.value}/></td><td style={{...tdStyle,color:C.mute,fontSize:12}}>{e.date?e.date.split("-").reverse().join("/"):"—"}</td>
          <td style={tdStyle}><button onClick={()=>toggleStatus(e.id)} style={{background:"none",border:"none",padding:0,cursor:"pointer"}}><Pill tone={st==="pago"?"paid":"amber"}><span style={{display:"inline-flex",alignItems:"center",gap:4}}>{st==="pago"?<CheckCircle2 size={11}/>:<ClockIcon size={11}/>}{st==="pago"?"Pago":"À Pagar"}{auto&&<span style={{fontSize:9,opacity:.65,marginLeft:2}}>auto</span>}</span></Pill></button></td>
          <td style={{...tdStyle,color:C.mute,fontSize:12,maxWidth:200}}>{e.desc||"—"}</td><td style={{...tdStyle,textAlign:"right"}}><button onClick={()=>del(e.id)} style={{border:"none",background:"transparent",cursor:"pointer",color:C.faint,padding:4}}><Trash2 size={15}/></button></td></tr>;})}
      </Tbl>}
    </Panel>
  </div>;
}

/* ════  IMPORTAR  ════ */
const MONTH_LOOKUP=(()=>{const m={};MONTHS.forEach((x,i)=>{m[x.k]=x.k;m[norm(x.full)]=x.k;m[norm(x.label)]=x.k;m[String(i+1)]=x.k;m[String(i+1).padStart(2,"0")]=x.k;});return m;})();
const LINE_LOOKUP=(()=>{const m={};SEED_LINES.forEach(l=>{m[norm(l.cat)]=l;});return m;})();
function buildTemplate(){
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([["Despesa","Mês","Valor","Data","Situação","Descrição"],["SALARIOS","Julho",1500000,"2026-07-05","a_pagar","Folha mensal"],["VALE TRANSPORTE","Julho",172000,"2026-07-05","a_pagar","VT julho"]]);
  ws["!cols"]=[{wch:34},{wch:14},{wch:14},{wch:14},{wch:12},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,"Lancamentos");
  const ref=[["Conta","Despesa"],...SEED_LINES.map(l=>[l.user,l.cat]),["",""],["Meses",""],...MONTHS.map(m=>[m.full,""]),["",""],["Situações",""],["pago",""],["a_pagar",""]];
  const wsr=XLSX.utils.aoa_to_sheet(ref);wsr["!cols"]=[{wch:18},{wch:34}];
  XLSX.utils.book_append_sheet(wb,wsr,"Referencia");
  XLSX.writeFile(wb,"Modelo_Importacao_GT.xlsx");
}
function Importar({user,isAdmin,users,entries,saveEntries}){
  const [rows,setRows]=useState(null);const [fileName,setFileName]=useState("");const [done,setDone]=useState(0);
  const allowed=new Set(scopedLines(user,isAdmin,users).map(l=>l.id));
  const onFile=async ev=>{
    const f=ev.target.files?.[0];if(!f)return;setFileName(f.name);setDone(0);
    const buf=await f.arrayBuffer();const wb=XLSX.read(buf,{type:"array",cellDates:true});
    const ws=wb.Sheets["Lancamentos"]||wb.Sheets[wb.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(ws,{defval:""});
    const parsed=json.map((r,i)=>{
      const get=keys=>{for(const k of Object.keys(r)){if(keys.includes(norm(k)))return r[k];}return "";};
      const dRaw=get(["despesa","linha"]),mRaw=get(["mes","mês"]),vRaw=get(["valor","value"]),dtRaw=get(["data","date","vencimento"]),stRaw=norm(String(get(["situacao","situação","status"])||"")),descRaw=get(["descricao","descrição","obs"]);
      const line=LINE_LOOKUP[norm(dRaw)],mk=MONTH_LOOKUP[norm(mRaw)],val=parseNum(vRaw);
      let date="";
      if(dtRaw instanceof Date){date=dtRaw.toISOString().slice(0,10);}
      else if(dtRaw){const s=String(dtRaw).trim();if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))date=s.split("/").reverse().join("-");else if(/^\d{4}-\d{2}-\d{2}/.test(s))date=s.slice(0,10);}
      const status=stRaw==="pago"?"pago":(date?isPastOrToday(date)?"pago":"a_pagar":"a_pagar");
      let ok=true,reason="";
      if(!line){ok=false;reason="Despesa não encontrada";}
      else if(!mk){ok=false;reason="Mês inválido";}
      else if(HIST_KEYS.includes(mk)){ok=false;reason="Jan–Mai bloqueado";}
      else if(!val||val<=0){ok=false;reason="Valor inválido";}
      else if(!date){ok=false;reason="Data obrigatória";}
      else if(!allowed.has(line.id)){ok=false;reason="Fora da sua conta";}
      return{i:i+2,line,mk,val,date,status,desc:String(descRaw||"").trim(),ok,reason,dRaw:String(dRaw)};
    });
    setRows(parsed);
  };
  const doImport=async()=>{
    const valid=rows.filter(r=>r.ok);
    await saveEntries([...entries,...valid.map(r=>({id:Date.now()+Math.random(),lineId:r.line.id,month:r.mk,value:r.val,status:r.status,date:r.date,desc:r.desc,by:user,ts:new Date().toISOString(),src:"import"}))]);
    setDone(valid.length);setRows(null);setFileName("");
  };
  const okCount=rows?rows.filter(r=>r.ok).length:0,badCount=rows?rows.length-okCount:0;
  return <div>
    <h2 style={{fontSize:19,fontWeight:800,margin:"0 0 3px",letterSpacing:-.3}}>Importar do Excel</h2>
    <p style={{margin:"0 0 18px",fontSize:12.5,color:C.mute}}>Colunas: <b>Despesa · Mês · Valor · Data · Situação · Descrição</b>.</p>
    <Panel title="1 · Planilha modelo"><button onClick={buildTemplate} style={{padding:"11px 18px",borderRadius:9,border:`1px solid ${C.green}`,background:C.greenSoft,color:C.green,fontWeight:700,fontSize:13.5,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}}><Download size={16}/> Baixar planilha modelo (.xlsx)</button></Panel>
    <Panel title="2 · Enviar planilha" hint={fileName||"Nenhum arquivo selecionado"}>
      <label style={{display:"inline-flex",alignItems:"center",gap:9,padding:"22px",border:`2px dashed ${C.line}`,borderRadius:12,cursor:"pointer",color:C.mute,fontSize:13.5,width:"100%",justifyContent:"center",background:C.paper}}>
        <FileSpreadsheet size={20} color={C.green}/> <span>Clique para selecionar <b>.xlsx</b></span>
        <input type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{display:"none"}}/>
      </label>
      {done>0&&<div style={{marginTop:12,padding:"10px 13px",borderRadius:9,background:C.greenSoft,color:C.green,fontSize:13,fontWeight:600,display:"flex",gap:8,alignItems:"center"}}><CheckCircle2 size={16}/> {done} lançamento(s) importado(s).</div>}
    </Panel>
    {rows&&<Panel title="3 · Conferência" hint={`${okCount} válidos · ${badCount} com erro`}>
      <div style={{display:"flex",gap:10,marginBottom:12}}><Pill tone="green">{okCount} prontos</Pill>{badCount>0&&<Pill tone="red">{badCount} ignorados</Pill>}</div>
      <Tbl head={["#","Despesa","Mês","Valor","Data","Situação","Resultado"]}>
        {rows.map((r,i)=><tr key={i}><td style={{...tdStyle,color:C.faint,fontSize:11.5}}>{r.i}</td><td style={{...tdStyle,fontWeight:600}}>{r.line?r.line.cat:r.dRaw||"—"}</td><td style={tdStyle}>{r.mk?MONTHS.find(m=>m.k===r.mk).full:"—"}</td><td style={tdNum}>{r.val?<Money v={r.val}/>:"—"}</td><td style={tdStyle}>{r.date?r.date.split("-").reverse().join("/"):"—"}</td><td style={tdStyle}>{r.ok?<Pill tone={r.status==="pago"?"paid":"amber"}>{r.status==="pago"?"Pago":"À Pagar"}</Pill>:"—"}</td><td style={tdStyle}>{r.ok?<Pill tone="green"><span style={{display:"inline-flex",alignItems:"center",gap:4}}><CheckCircle2 size={12}/>OK</span></Pill>:<Pill tone="red"><span style={{display:"inline-flex",alignItems:"center",gap:4}}><XCircle size={12}/>{r.reason}</span></Pill>}</td></tr>)}
      </Tbl>
      <button onClick={doImport} disabled={okCount===0} style={{marginTop:14,padding:"11px 20px",borderRadius:9,border:"none",background:okCount?C.green:"#C9CDC9",color:"#fff",fontWeight:700,fontSize:13.5,cursor:okCount?"pointer":"not-allowed",display:"inline-flex",alignItems:"center",gap:8}}><Upload size={16}/> Importar {okCount} lançamento(s)</button>
    </Panel>}
  </div>;
}

/* ════  PREMISSAS  ════ */
function Premissas({revenue,saveRevenue,pctOv,savePct,entries,saveEntries}){
  const [rev,setRev]=useState(revenue);
  const [draft,setDraft]=useState(()=>{const d={};SEED_LINES.forEach(l=>MONTHS.forEach(m=>{d[`${l.id}_${m.k}`]=pct2(effPct(l,m.k,pctOv));}));return d;});
  const [savedRev,setSavedRev]=useState(false);const [savedPct,setSavedPct]=useState(false);
  const setRevF=(k,v)=>{setRev(p=>({...p,[k]:v}));setSavedRev(false);};
  const commitRev=async()=>{const c={};for(const k of OPEN_KEYS){const v=parseNum(rev[k]);c[k]=isNaN(v)?0:v;}await saveRevenue(c);setSavedRev(true);};
  const setCell=(id,mk,v)=>{setDraft(p=>({...p,[`${id}_${mk}`]:v}));setSavedPct(false);};
  const totals=useMemo(()=>{const t={};MONTHS.forEach(m=>{let s=0;SEED_LINES.forEach(l=>{const v=parseNum(draft[`${l.id}_${m.k}`]);s+=isNaN(v)?0:v/100;});t[m.k]=s;});return t;},[draft]);
  const commitPct=async()=>{const ov={};SEED_LINES.forEach(l=>{MONTHS.forEach(m=>{const v=parseNum(draft[`${l.id}_${m.k}`]);const dec=isNaN(v)?0:v/100;if(Math.abs(dec-l.minPct)>1e-9){if(!ov[l.id])ov[l.id]={};ov[l.id][m.k]=dec;}});});await savePct(ov);setSavedPct(true);};
  const resetPct=async()=>{if(!confirm("Restaurar padrão?"))return;const d={};SEED_LINES.forEach(l=>MONTHS.forEach(m=>{d[`${l.id}_${m.k}`]=pct2(l.minPct);}));setDraft(d);await savePct({});setSavedPct(true);};
  const reset=async()=>{if(confirm("Apagar TODOS os lançamentos?"))await saveEntries([]);};
  return <div>
    <h2 style={{fontSize:19,fontWeight:800,margin:"0 0 3px",letterSpacing:-.3}}>Premissas de projeção</h2>
    <p style={{margin:"0 0 18px",fontSize:12.5,color:C.mute}}>Orçado = <b>recebimento previsto × %</b> por conta.</p>
    <Panel title="Recebimento previsto (meses abertos)">
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12}}>
        {OPEN_KEYS.map(k=><Field key={k} label={MONTHS.find(m=>m.k===k).full}><input value={rev[k]} onChange={e=>setRevF(k,e.target.value)} inputMode="decimal" style={inpStyle}/></Field>)}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginTop:16}}><button onClick={commitRev} style={btnGreen}>Salvar recebimento</button>{savedRev&&<span style={{fontSize:12.5,color:C.green,fontWeight:600}}>✓ Salvo</span>}</div>
    </Panel>
    <Panel title="% ideal por conta × mês" hint="Total ≈ 72,0%">
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"separate",borderSpacing:0,fontSize:12}}>
          <thead><tr>
            <th style={{...thStyle,position:"sticky",left:0,background:C.panel,zIndex:2,textAlign:"left",minWidth:200}}>Conta financeira</th>
            {MONTHS.map(m=><th key={m.k} style={{...thStyle,textAlign:"center",minWidth:62,color:m.hist?C.faint:C.mute}}>{m.label}</th>)}
          </tr></thead>
          <tbody>
            {SEED_LINES.map(l=><tr key={l.id}><td style={{...tdStyle,position:"sticky",left:0,background:C.panel,zIndex:1,fontWeight:600,whiteSpace:"nowrap"}}><span style={{fontSize:10.5,color:C.faint,marginRight:6}}>{cap(l.user)}</span>{l.cat}</td>{MONTHS.map(m=><td key={m.k} style={{padding:"3px",borderBottom:`1px solid ${C.paper}`}}><input value={draft[`${l.id}_${m.k}`]} onChange={e=>setCell(l.id,m.k,e.target.value)} inputMode="decimal" style={{width:56,padding:"6px 5px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:11.5,textAlign:"right",background:m.hist?C.paper:"#fff",color:C.ink,fontVariantNumeric:"tabular-nums"}}/></td>)}</tr>)}
            <tr style={{borderTop:`2px solid ${C.ink}`}}><td style={{...tdStyle,position:"sticky",left:0,background:C.panel,fontWeight:800}}>TOTAL (%)</td>{MONTHS.map(m=>{const t=totals[m.k];const off=Math.abs(t-0.719897)>0.005;return<td key={m.k} style={{...tdStyle,textAlign:"center",fontWeight:800,color:off?C.amber:C.green,fontVariantNumeric:"tabular-nums"}}>{pct2(t)}</td>;})}</tr>
          </tbody>
        </table>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:12,marginTop:16,flexWrap:"wrap"}}>
        <button onClick={commitPct} style={btnGreen}>Salvar percentuais</button>
        <button onClick={resetPct} style={{padding:"10px 16px",borderRadius:9,border:`1px solid ${C.line}`,background:"#fff",color:C.mute,fontWeight:700,fontSize:13,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7}}><RotateCcw size={14}/> Restaurar padrão</button>
        {savedPct&&<span style={{fontSize:12.5,color:C.green,fontWeight:600}}>✓ Salvo</span>}
      </div>
    </Panel>
    <Panel title="Zona de manutenção" hint="Ações irreversíveis">
      <button onClick={reset} style={{padding:"9px 16px",borderRadius:9,border:`1px solid ${C.red}`,background:C.redSoft,color:C.red,fontWeight:700,fontSize:13,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}}><RotateCcw size={15}/> Limpar todos os lançamentos</button>
    </Panel>
  </div>;
}

/* ════  GERENCIAR USUÁRIOS  ════ */
const ROLE_LABELS={admin:"Administrador",premissas:"Premissas",conta:"Conta"};
const ROLE_TONES={admin:"green",premissas:"amber",conta:"mute"};
function GerenciarUsuarios({users,saveUsers,authMap,saveAuth,currentUser}){
  const [modal,setModal]=useState(null);
  const [target,setTarget]=useState(null);
  const [flash,setFlash]=useState("");
  const doFlash=msg=>{setFlash(msg);setTimeout(()=>setFlash(""),3000);};
  const handleAdd=async({name,role,account})=>{
    const id=name.toUpperCase().trim();
    if(users.find(u=>u.id===id))return"Já existe um usuário com esse nome.";
    const defHash=await sha256(DEFAULT_PIN);
    await saveUsers([...users,{id,name:id,role,account:account||id,seed:false}]);
    await saveAuth({...authMap,[id]:{hash:defHash,firstLogin:true}});
    doFlash(`Usuário ${cap(id)} criado. Senha inicial: 123456.`);return null;
  };
  const handleEdit=async({id,role,account})=>{
    await saveUsers(users.map(u=>u.id===id?{...u,role,account:account||u.account}:u));
    doFlash(`Usuário ${cap(id)} atualizado.`);return null;
  };
  const handleDelete=async(u)=>{
    if(u.seed)return"Usuários originais não podem ser excluídos.";
    if(u.id===currentUser)return"Você não pode excluir sua própria conta.";
    const nm={...authMap};delete nm[u.id];
    await saveUsers(users.filter(x=>x.id!==u.id));await saveAuth(nm);
    setModal(null);setTarget(null);doFlash(`Usuário ${cap(u.id)} excluído.`);return null;
  };
  const handleReset=async(u)=>{
    await saveAuth({...authMap,[u.id]:{hash:await sha256(DEFAULT_PIN),firstLogin:true}});
    setModal(null);setTarget(null);doFlash(`Senha de ${cap(u.id)} redefinida para 123456.`);
  };
  const handleAdminSetPin=async(u,newPin)=>{
    if(newPin.length!==6)return"A senha deve ter 6 dígitos.";
    const nh=await sha256(newPin);
    if(Object.entries(authMap).find(([id,v])=>id!==u.id&&v.hash===nh))return"Senha já em uso.";
    await saveAuth({...authMap,[u.id]:{hash:nh,firstLogin:false}});
    setModal(null);setTarget(null);doFlash(`Senha de ${cap(u.id)} definida.`);return null;
  };
  const statusOf=u=>{const rec=authMap[u.id];if(!rec)return{label:"Nunca acessou",tone:"mute",icon:<ClockIcon size={12}/>};if(rec.firstLogin)return{label:"Aguarda 1º acesso",tone:"amber",icon:<AlertTriangle size={12}/>};return{label:"Ativo",tone:"paid",icon:<CheckCircle2 size={12}/>};};
  const admins=users.filter(u=>u.role==="admin"),prems=users.filter(u=>u.role==="premissas"),contas=users.filter(u=>u.role==="conta");
  return <div>
    <div style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:18,flexWrap:"wrap"}}>
      <div>
        <h2 style={{fontSize:19,fontWeight:800,margin:0,letterSpacing:-.3}}>Gerenciar usuários</h2>
        <p style={{margin:"4px 0 0",fontSize:12.5,color:C.mute}}>{users.length} usuários cadastrados.</p>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        {flash&&<div style={{padding:"8px 14px",borderRadius:9,background:C.paidSoft,color:C.paid,fontSize:12.5,fontWeight:700,display:"flex",gap:7,alignItems:"center"}}><CheckCircle2 size={15}/>{flash}</div>}
        <button onClick={()=>{setTarget(null);setModal("add");}} style={{padding:"9px 16px",borderRadius:9,border:"none",background:C.navy,color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7}}><UserPlus size={15}/> Novo usuário</button>
      </div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:18}}>
      <MiniKpi label="Total" value={users.length} color={C.ink} bg={C.paper}/>
      <MiniKpi label="Administradores" value={admins.length} color={C.green} bg={C.greenSoft}/>
      <MiniKpi label="Premissas" value={prems.length} color={C.amber} bg={C.oweSoft}/>
      <MiniKpi label="Contas" value={contas.length} color={C.mute} bg={C.paper}/>
      <MiniKpi label="Ativos" value={users.filter(u=>{const r=authMap[u.id];return r&&!r.firstLogin;}).length} color={C.paid} bg={C.paidSoft}/>
    </div>
    {admins.length>0&&<Panel title="Administradores"><UsuariosTable rows={admins} authMap={authMap} statusOf={statusOf} currentUser={currentUser} onEdit={u=>{setTarget(u);setModal("edit");}} onDelete={u=>{setTarget(u);setModal("delete");}} onReset={u=>{setTarget(u);setModal("reset");}} onSetPin={u=>{setTarget(u);setModal("setpin");}}/></Panel>}
    {prems.length>0&&<Panel title="Premissas"><UsuariosTable rows={prems} authMap={authMap} statusOf={statusOf} currentUser={currentUser} onEdit={u=>{setTarget(u);setModal("edit");}} onDelete={u=>{setTarget(u);setModal("delete");}} onReset={u=>{setTarget(u);setModal("reset");}} onSetPin={u=>{setTarget(u);setModal("setpin");}}/></Panel>}
    {contas.length>0&&<Panel title={`Contas / responsáveis (${contas.length})`}><UsuariosTable rows={contas} authMap={authMap} statusOf={statusOf} currentUser={currentUser} onEdit={u=>{setTarget(u);setModal("edit");}} onDelete={u=>{setTarget(u);setModal("delete");}} onReset={u=>{setTarget(u);setModal("reset");}} onSetPin={u=>{setTarget(u);setModal("setpin");}}/></Panel>}

    {modal==="add"&&<UserFormModal title="Novo usuário" subtitle="Receberá senha inicial 123456." users={users} onSave={handleAdd} onClose={()=>setModal(null)}/>}
    {modal==="edit"&&target&&<UserFormModal title={`Editar — ${cap(target.id)}`} subtitle="Altere o perfil de acesso." users={users} initial={target} onSave={d=>handleEdit({id:target.id,...d})} onClose={()=>{setModal(null);setTarget(null);}}/>}
    {modal==="delete"&&target&&<Modal onClose={()=>{setModal(null);setTarget(null);}}>
      <div style={{textAlign:"center",padding:"8px 0 4px"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:C.redSoft,display:"grid",placeItems:"center",margin:"0 auto 14px"}}><Trash2 size={24} color={C.red}/></div>
        <h3 style={{fontWeight:800,margin:"0 0 8px",fontSize:17}}>Excluir usuário</h3>
        {target.seed?<p style={{color:C.red,fontSize:13.5,margin:"0 0 20px",lineHeight:1.55}}>Usuários originais não podem ser excluídos.</p>:<p style={{color:C.mute,fontSize:13.5,margin:"0 0 20px",lineHeight:1.55}}>O usuário <b>{cap(target.id)}</b> será removido permanentemente.</p>}
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>{setModal(null);setTarget(null);}} style={{...btnOutline,minWidth:100}}>Cancelar</button>
          {!target.seed&&target.id!==currentUser&&<button onClick={()=>handleDelete(target)} style={{...btnRed,minWidth:130}}>Confirmar exclusão</button>}
        </div>
      </div>
    </Modal>}
    {modal==="reset"&&target&&<Modal onClose={()=>{setModal(null);setTarget(null);}}>
      <div style={{textAlign:"center",padding:"8px 0 4px"}}>
        <div style={{width:52,height:52,borderRadius:"50%",background:C.amberSoft,display:"grid",placeItems:"center",margin:"0 auto 14px"}}><RefreshCw size={24} color={C.amber}/></div>
        <h3 style={{fontWeight:800,margin:"0 0 8px",fontSize:17}}>Redefinir senha</h3>
        <p style={{color:C.mute,fontSize:13.5,margin:"0 0 20px",lineHeight:1.55}}>A senha de <b>{cap(target.id)}</b> será redefinida para <b>123456</b>.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>{setModal(null);setTarget(null);}} style={{...btnOutline,minWidth:100}}>Cancelar</button>
          <button onClick={()=>handleReset(target)} style={{...btnAmber,minWidth:130}}>Confirmar reset</button>
        </div>
      </div>
    </Modal>}
    {modal==="setpin"&&target&&<SetPinModal user={target} authMap={authMap} onSave={pin=>handleAdminSetPin(target,pin)} onClose={()=>{setModal(null);setTarget(null);}}/>}
  </div>;
}
function UsuariosTable({rows,authMap,statusOf,currentUser,onEdit,onDelete,onReset,onSetPin}){
  return <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
    <thead><tr>{["Usuário","Perfil","Status","Conta vinculada","Ações"].map((h,i)=><th key={i} style={{...thStyle,textAlign:i===4?"right":"left"}}>{h}</th>)}</tr></thead>
    <tbody>{rows.map(u=>{const st=statusOf(u);return<tr key={u.id}>
      <td style={{...tdStyle,fontWeight:700}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:30,height:30,borderRadius:"50%",background:u.role==="admin"?C.greenSoft:C.paper,display:"grid",placeItems:"center",border:`1px solid ${C.line}`,flexShrink:0}}>{u.role==="admin"?<ShieldCheck size={14} color={C.green}/>:<UserIcon size={14} color={C.mute}/>}</div><div>{cap(u.name)}{u.id===currentUser&&<span style={{marginLeft:6,fontSize:10,color:C.faint,fontWeight:400}}>(você)</span>}{u.seed&&<span style={{marginLeft:6,fontSize:9,color:C.faint,fontWeight:400}}>original</span>}</div></div></td>
      <td style={tdStyle}><Pill tone={ROLE_TONES[u.role]||"mute"}>{ROLE_LABELS[u.role]||u.role}</Pill></td>
      <td style={tdStyle}><Pill tone={st.tone}><span style={{display:"inline-flex",alignItems:"center",gap:4}}>{st.icon}{st.label}</span></Pill></td>
      <td style={{...tdStyle,color:C.mute,fontSize:12}}>{cap(u.account)||"—"}</td>
      <td style={{...tdStyle,textAlign:"right"}}><div style={{display:"flex",gap:6,justifyContent:"flex-end",flexWrap:"wrap"}}>
        <ActionBtn icon={<UserCheck size={12}/>} label="Editar" onClick={()=>onEdit(u)} color={C.green} bg={C.greenSoft}/>
        <ActionBtn icon={<KeyIcon size={12}/>} label="Senha" onClick={()=>onSetPin(u)} color={C.navy} bg={C.paper}/>
        <ActionBtn icon={<RefreshCw size={12}/>} label="Reset" onClick={()=>onReset(u)} color={C.amber} bg={C.amberSoft}/>
        {!u.seed&&u.id!==currentUser&&<ActionBtn icon={<Trash2 size={12}/>} label="Excluir" onClick={()=>onDelete(u)} color={C.red} bg={C.redSoft}/>}
      </div></td>
    </tr>;})}
    </tbody>
  </table></div>;
}
function UserFormModal({title,subtitle,users,initial,onSave,onClose}){
  const isEdit=!!initial;
  const [name,setName]=useState(initial?.name||"");
  const [role,setRole]=useState(initial?.role||"conta");
  const [account,setAccount]=useState(initial?.account||"");
  const [err,setErr]=useState("");const [saving,setSaving]=useState(false);
  const seedAccounts=[...new Set(SEED_LINES.map(l=>l.user))];
  const submit=async()=>{
    const tn=name.trim().toUpperCase();
    if(!tn){setErr("Informe o nome.");return;}
    if(!isEdit&&users.find(u=>u.id===tn)){setErr("Usuário já existe.");return;}
    const acct=account||tn;setSaving(true);
    const e=await onSave({name:tn,role,account:acct});setSaving(false);
    if(e){setErr(e);return;}onClose();
  };
  return <Modal onClose={onClose}>
    <h3 style={{fontWeight:800,margin:"0 0 4px",fontSize:17}}>{title}</h3>
    <p style={{color:C.mute,fontSize:13,margin:"0 0 20px",lineHeight:1.5}}>{subtitle}</p>
    {!isEdit&&<><label style={labelSt}>Nome do usuário *</label><input value={name} onChange={e=>{setName(e.target.value);setErr("");}} placeholder="Ex.: CAROLINA" style={{...inpStyle,marginTop:6,marginBottom:14,textTransform:"uppercase"}}/></>}
    <label style={labelSt}>Perfil de acesso *</label>
    <div style={{display:"flex",gap:8,marginTop:6,marginBottom:8}}>
      {[["admin","Administrador"],["premissas","Premissas"],["conta","Conta"]].map(([v,l])=><button key={v} onClick={()=>setRole(v)} style={{flex:1,padding:"9px 6px",borderRadius:9,border:`1.5px solid ${role===v?C.navy:C.line}`,background:role===v?C.navy:"#fff",color:role===v?"#fff":C.mute,fontWeight:700,fontSize:12.5,cursor:"pointer"}}>{l}</button>)}
    </div>
    <div style={{marginBottom:12,padding:"8px 12px",borderRadius:8,background:C.paper,fontSize:12,color:C.mute,lineHeight:1.55}}>
      {role==="admin"&&"Visão completa, todos os lançamentos, gerenciar usuários e premissas."}
      {role==="premissas"&&"Visão completa de leitura, lançamentos em todas as contas e acesso às premissas."}
      {role==="conta"&&"Acesso restrito às linhas de despesa da conta vinculada."}
    </div>
    {role==="conta"&&<><label style={{...labelSt,marginTop:4}}>Conta vinculada *</label><div style={{position:"relative",marginTop:6,marginBottom:8}}><select value={account} onChange={e=>{setAccount(e.target.value);setErr("");}} style={{width:"100%",appearance:"none",padding:"10px 32px 10px 12px",borderRadius:9,border:`1px solid ${C.line}`,fontSize:13.5,background:"#fff",color:account?C.ink:C.faint,cursor:"pointer"}}><option value="">Selecione a conta…</option>{seedAccounts.map(a=><option key={a} value={a}>{cap(a)}</option>)}</select><ChevronDown size={15} color={C.mute} style={{position:"absolute",right:10,top:11,pointerEvents:"none"}}/></div></>}
    {err&&<div style={{margin:"8px 0",padding:"8px 11px",borderRadius:8,background:C.redSoft,color:C.red,fontSize:12.5,display:"flex",gap:6,alignItems:"center"}}><AlertTriangle size={13}/>{err}</div>}
    <div style={{display:"flex",gap:10,marginTop:16}}>
      <button onClick={onClose} style={{...btnOutline,flex:1}}>Cancelar</button>
      <button onClick={submit} disabled={saving} style={{...btnGreen,flex:1,justifyContent:"center",display:"flex",alignItems:"center",gap:7}}>{isEdit?<UserCheck size={15}/>:<UserPlus size={15}/>}{saving?"Salvando…":isEdit?"Salvar alterações":"Criar usuário"}</button>
    </div>
  </Modal>;
}
function SetPinModal({user,authMap,onSave,onClose}){
  const [newPin,setNewPin]=useState("");const [conf,setConf]=useState("");const [show,setShow]=useState(false);const [err,setErr]=useState("");const [saving,setSaving]=useState(false);
  const submit=async()=>{if(newPin.length!==6){setErr("6 dígitos.");return;}if(newPin!==conf){setErr("Confirmação não coincide.");return;}setSaving(true);const e=await onSave(newPin);setSaving(false);if(e){setErr(e);return;}};
  return <Modal onClose={onClose}>
    <h3 style={{fontWeight:800,margin:"0 0 4px",fontSize:17}}>Definir nova senha</h3>
    <p style={{color:C.mute,fontSize:13,margin:"0 0 18px"}}>Definindo senha para <b>{cap(user.id)}</b>.</p>
    <label style={labelSt}>Nova senha</label><PinInput value={newPin} onChange={setNewPin} show={show} setShow={setShow} placeholder="Nova senha"/>
    <PinDots value={newPin}/>
    <label style={{...labelSt,marginTop:14}}>Confirmar</label><PinInput value={conf} onChange={setConf} show={show} setShow={setShow} placeholder="Repita" onEnter={submit} matchOk={conf.length===6&&conf===newPin} matchFail={conf.length===6&&conf!==newPin}/>
    {err&&<div style={{margin:"10px 0",padding:"8px 11px",borderRadius:8,background:C.redSoft,color:C.red,fontSize:12.5,display:"flex",gap:6,alignItems:"center"}}><AlertTriangle size={13}/>{err}</div>}
    <div style={{display:"flex",gap:10,marginTop:18}}>
      <button onClick={onClose} style={{...btnOutline,flex:1}}>Cancelar</button>
      <button onClick={submit} disabled={saving} style={{...btnGreen,flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:7}}><KeyIcon size={14}/>{saving?"Salvando…":"Salvar senha"}</button>
    </div>
  </Modal>;
}
function ActionBtn({icon,label,onClick,color,bg}){
  return <button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:7,border:`1px solid ${color}33`,background:bg,color,fontSize:11.5,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>{icon}{label}</button>;
}
function Modal({onClose,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(27,42,58,.55)",display:"grid",placeItems:"center",zIndex:100,padding:18}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:C.panel,borderRadius:16,padding:"28px 28px",width:"100%",maxWidth:440,boxShadow:"0 20px 60px rgba(0,0,0,.25)",position:"relative",maxHeight:"90vh",overflowY:"auto"}}>
      <button onClick={onClose} style={{position:"absolute",top:14,right:14,border:"none",background:"transparent",cursor:"pointer",color:C.faint}}><XCircle size={20}/></button>
      {children}
    </div>
  </div>;
}

/* ════  COMPONENTES AUXILIARES  ════ */
function ProgressBar({pago,aPagar,orcado}){
  const total=Math.max(pago+aPagar,orcado,1);
  const wP=Math.min(100,pago/total*100),wA=Math.min(100,(pago+aPagar)/total*100-wP),wO=Math.min(100,orcado/total*100);
  return <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:13,padding:"14px 17px",marginBottom:18}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:12,color:C.mute,fontWeight:600}}><span>Composição vs orçado</span><span style={{color:C.faint,fontSize:11}}>{pct(Math.min(1,(pago+aPagar)/Math.max(orcado,1)))} realizado</span></div>
    <div style={{position:"relative",height:18,borderRadius:9,background:C.paper,overflow:"hidden"}}>
      <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${wP}%`,background:C.paid,transition:"width .3s"}}/>
      <div style={{position:"absolute",left:`${wP}%`,top:0,height:"100%",width:`${wA}%`,background:C.amber,transition:"width .3s"}}/>
      <div style={{position:"absolute",left:`${wO}%`,top:0,height:"100%",width:2,background:C.ink,opacity:.35}}/>
    </div>
    <div style={{display:"flex",gap:16,marginTop:8,fontSize:11.5,flexWrap:"wrap"}}>
      <LegDot color={C.paid} label={`Pago: ${fmt(pago)}`}/><LegDot color={C.amber} label={`À Pagar: ${fmt(aPagar)}`}/><LegDot color={C.ink} label={`Orçado: ${fmt(orcado)}`} opacity={.35}/>
    </div>
  </div>;
}
function LegDot({color,label,opacity=1}){return <span style={{display:"inline-flex",alignItems:"center",gap:5,color:C.mute}}><span style={{width:10,height:10,borderRadius:2,background:color,opacity,display:"inline-block"}}/>{label}</span>;}
function MiniKpi({label,value,color,bg}){return <div style={{background:bg,border:`1px solid ${C.line}`,borderRadius:10,padding:"10px 14px"}}><div style={{fontSize:10.5,fontWeight:700,letterSpacing:.4,textTransform:"uppercase",color:C.mute,marginBottom:4}}>{label}</div><div style={{fontSize:16,fontWeight:800,color,fontVariantNumeric:"tabular-nums"}}>{value}</div></div>;}
function Kpi({icon:Icon,label,value,sub,tone}){
  const map={ink:{c:C.ink,bg:C.paper},green:{c:C.green,bg:C.greenSoft},red:{c:C.red,bg:C.redSoft},amber:{c:C.amber,bg:C.amberSoft},paid:{c:C.paid,bg:C.paidSoft}};const t=map[tone]||map.ink;
  return <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:13,padding:"15px 16px"}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}><div style={{width:28,height:28,borderRadius:7,background:t.bg,display:"grid",placeItems:"center"}}><Icon size={15} color={t.c}/></div><span style={{fontSize:10.5,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",color:C.mute}}>{label}</span></div>
    <div style={{fontSize:20,fontWeight:800,letterSpacing:-.5,color:t.c,fontVariantNumeric:"tabular-nums",lineHeight:1.1}}>{value}</div>
    {sub&&<div style={{fontSize:11.5,color:C.faint,marginTop:3}}>{sub}</div>}
  </div>;
}
function Panel({title,hint,children}){
  return <div style={{background:C.panel,border:`1px solid ${C.line}`,borderRadius:13,padding:"16px 17px",marginBottom:18}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:14,flexWrap:"wrap"}}><h3 style={{fontSize:14,fontWeight:800,margin:0,letterSpacing:-.2}}>{title}</h3>{hint&&<div style={{fontSize:11.5,color:C.faint}}>{hint}</div>}</div>{children}
  </div>;
}
function Tbl({head,children}){
  const numCols=["Orçado","Pago","À Pagar","Total","Variação","Valor","% receb."];
  return <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
    <thead><tr>{head.map((h,i)=><th key={i} style={{...thStyle,textAlign:numCols.includes(h)?"right":"left"}}>{h}</th>)}</tr></thead>
    <tbody>{children}</tbody>
  </table></div>;
}
function Toggle({value,onChange,opts}){return <div style={{display:"flex",background:"#fff",border:`1px solid ${C.line}`,borderRadius:9,padding:3,gap:3}}>{opts.map(([v,l])=><button key={v} onClick={()=>onChange(v)} style={{padding:"6px 14px",borderRadius:6,border:"none",background:value===v?C.ink:"transparent",color:value===v?"#fff":C.mute,fontWeight:600,fontSize:12.5,cursor:"pointer"}}>{l}</button>)}</div>;}
function StatusPill({vari,orc,real}){if(orc===0&&real===0)return<Pill tone="mute">—</Pill>;if(orc===0&&real>0)return<Pill tone="red">Sem orçado</Pill>;if(vari>0.5)return<Pill tone="red">Acima</Pill>;if(real===0)return<Pill tone="mute">Sem lanç.</Pill>;return<Pill tone="green">Dentro</Pill>;}
function Pill({tone,children}){const map={green:[C.greenSoft,C.green],amber:[C.oweSoft,C.amber],red:[C.redSoft,C.red],mute:[C.paper,C.mute],paid:[C.paidSoft,C.paid]};const [bg,c]=map[tone]||map.mute;return <span style={{display:"inline-block",padding:"3px 9px",borderRadius:20,background:bg,color:c,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{children}</span>;}
function Field({label,children,span2}){return <div style={{gridColumn:span2?"span 2":"auto",minWidth:0}}><label style={{display:"block",fontSize:10.5,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",color:C.mute,marginBottom:6}}>{label}</label>{children}</div>;}
function Select({value,onChange,children}){return <div style={{position:"relative"}}><select value={value} onChange={e=>onChange(e.target.value)} style={{...inpStyle,appearance:"none",paddingRight:32,cursor:"pointer"}}>{children}</select><ChevronDown size={15} color={C.mute} style={{position:"absolute",right:10,top:11,pointerEvents:"none"}}/></div>;}
function SelectBlock({value,onChange,children}){return <div style={{position:"relative",maxWidth:460}}><select value={value} onChange={e=>onChange(e.target.value)} style={{width:"100%",appearance:"none",padding:"11px 36px 11px 13px",borderRadius:10,border:`1px solid ${C.line}`,fontSize:14,background:"#fff",color:C.ink,cursor:"pointer",fontWeight:600}}>{children}</select><ChevronDown size={16} color={C.mute} style={{position:"absolute",right:12,top:13,pointerEvents:"none"}}/></div>;}
function SelectInline({value,onChange,children,icon:Icon}){return <div style={{position:"relative"}}>{Icon&&<Icon size={14} color={C.mute} style={{position:"absolute",left:10,top:9}}/>}<select value={value} onChange={e=>onChange(e.target.value)} style={{appearance:"none",padding:Icon?"7px 28px 7px 30px":"7px 26px 7px 11px",borderRadius:8,border:`1px solid ${C.line}`,background:"#fff",fontSize:12.5,cursor:"pointer",color:C.ink}}>{children}</select><ChevronDown size={14} color={C.mute} style={{position:"absolute",right:8,top:9,pointerEvents:"none"}}/></div>;}
function DashTip({active,payload,label}){if(!active||!payload||!payload.length)return null;const g=k=>payload.find(p=>p.dataKey===k)?.value||0;const total=g("pago")+g("aPagar");const vari=total-g("orcado");return<div style={tipBox}><div style={{fontWeight:800,marginBottom:6}}>{label}</div><TipRow c={C.budget} k="Orçado" v={<Money v={g("orcado")}/>}/><TipRow c={C.paid} k="Pago" v={<Money v={g("pago")}/>}/><TipRow c={C.amber} k="À Pagar" v={<Money v={g("aPagar")}/>}/><TipRow c={C.ink} k="Total" v={<Money v={total}/>}/><div style={{borderTop:`1px solid ${C.line}`,marginTop:6,paddingTop:6}}><TipRow c={vari>0?C.red:C.green} k="Variação" v={<span>{vari>0?"+":""}<Money v={vari}/></span>} bold/></div></div>;}
function DespTip({active,payload,label}){if(!active||!payload||!payload.length)return null;const g=k=>payload.find(p=>p.dataKey===k)?.value||0;const total=g("pago")+g("aPagar");const vari=total-g("orcado");return<div style={tipBox}><div style={{fontWeight:800,marginBottom:6}}>{label}</div><TipRow c={C.budget} k="Orçado" v={<Money v={g("orcado")}/>}/><TipRow c={C.paid} k="Pago" v={<Money v={g("pago")}/>}/><TipRow c={C.amber} k="À Pagar" v={<Money v={g("aPagar")}/>}/><TipRow c={C.ink} k="Total" v={<Money v={total}/>}/><div style={{borderTop:`1px solid ${C.line}`,marginTop:6,paddingTop:6}}><TipRow c={vari>0?C.red:C.green} k="Variação" v={<span>{vari>0?"+":""}<Money v={vari}/></span>} bold/></div></div>;}
function TipRow({c,k,v,bold}){return<div style={{display:"flex",alignItems:"center",gap:8,margin:"2px 0"}}><span style={{width:8,height:8,borderRadius:2,background:c}}/><span style={{color:C.mute,marginRight:"auto"}}>{k}</span><span style={{fontWeight:bold?800:600,fontVariantNumeric:"tabular-nums"}}>{v}</span></div>;}

const labelSt={fontSize:11,fontWeight:700,letterSpacing:.6,textTransform:"uppercase",color:C.mute};
const inpStyle={width:"100%",padding:"10px 12px",borderRadius:9,border:`1px solid ${C.line}`,fontSize:13.5,background:"#fff",color:C.ink,boxSizing:"border-box",fontFamily:"inherit"};
const thStyle={padding:"8px 10px",fontSize:10.5,fontWeight:700,letterSpacing:.4,textTransform:"uppercase",color:C.mute,borderBottom:`1px solid ${C.line}`,whiteSpace:"nowrap"};
const tdStyle={padding:"9px 10px",borderBottom:`1px solid #F2F6F8`,color:"#1B2A3A"};
const tdNum={...tdStyle,textAlign:"right",fontVariantNumeric:"tabular-nums"};
const btnGreen={padding:"10px 18px",borderRadius:9,border:"none",background:"#3B7CA8",color:"#fff",fontWeight:700,fontSize:13.5,cursor:"pointer"};
const btnOutline={padding:"10px 18px",borderRadius:9,border:`1px solid #DCE6EA`,background:"#fff",color:"#5B6B76",fontWeight:700,fontSize:13.5,cursor:"pointer"};
const btnAmber={padding:"10px 18px",borderRadius:9,border:"none",background:"#9C6B1E",color:"#fff",fontWeight:700,fontSize:13.5,cursor:"pointer"};
const btnRed={padding:"10px 18px",borderRadius:9,border:"none",background:"#B2433A",color:"#fff",fontWeight:700,fontSize:13.5,cursor:"pointer"};
const tipBox={background:"#fff",border:`1px solid #DCE6EA`,borderRadius:10,padding:"10px 12px",boxShadow:"0 8px 24px rgba(0,0,0,.1)",fontSize:12};
function monthRange(){return `${MONTHS.find(m=>m.k===OPEN_KEYS[0]).full}–${MONTHS.find(m=>m.k===OPEN_KEYS[OPEN_KEYS.length-1]).full}`;}

/* ════  RENDER  ════ */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
